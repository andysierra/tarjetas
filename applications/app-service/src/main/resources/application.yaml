server:
  port: 8080
spring:
  application:
    name: "pruebatecnica"
  devtools:
    add-properties: false
  h2:
    console:
      enabled: true
      path: "/h2"
  profiles:
    include: null
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080"
adapters:
  secretmanager:
    r2dbc:
      host: ${DB_HOST}
      port: ${DB_PORT}
      database: ${DB_NAME}
      schema: ${DB_SCHEMA}
      username: ${DB_USER}
      password: ${DB_PASSWORD}
